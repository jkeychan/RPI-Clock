# /etc/sysctl.d/99-rpi-clock.conf - Kernel parameter tuning for RPI-Clock
#
# Optimized for: SD card storage, low RAM (Pi Zero 2 W), unattended NTP server operation
# Install: sudo cp sysctl/99-rpi-clock.conf /etc/sysctl.d/ && sudo sysctl --system

# SD card: smaller, more frequent write batches (default tuning is for spinning disks)
vm.dirty_ratio = 5
vm.dirty_background_ratio = 2
vm.dirty_expire_centisecs = 1500
vm.dirty_writeback_centisecs = 500

# Low RAM: reclaim dentry/inode caches more aggressively
vm.swappiness = 10
vm.vfs_cache_pressure = 200

# Unattended: auto-reboot 10s after kernel panic instead of hanging
kernel.panic = 10
