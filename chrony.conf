# /etc/chrony/chrony.conf - GPS+PPS time server for RPI-Clock

driftfile /var/lib/chrony/drift
logdir /var/log/chrony
log measurements tracking

# NTP Pool serving - remove 'allow all' to stop serving NTP to network clients
allow all
cmdallow 127.0.0.1
cmdallow ::1

# GPS NMEA via gpsd SHM segment 0 (Pi 5: device 0 = /dev/ttyAMA0, device 1 = /dev/pps0)
# offset 0: NMEA arrives ~500ms early on Pi 5; tune after PPS lock via: chronyc sourcestats
# noselect: used only to resolve which second each PPS pulse belongs to
refclock SHM 0 refid GPS offset 0 delay 0.5 noselect poll 4

# PPS hardware signal from GPS HAT GPIO 4 - primary precision source
# lock GPS: requires GPS SHM reachability before PPS is usable
# prefer: choose PPS over NTP servers when available
# trust: include in selection even when offset disagrees with NTP cluster
refclock PPS /dev/pps0 refid PPS lock GPS poll 4 prefer trust

# Fallback NTP servers (used when PPS is not available or during initial sync)
server clock1.unc.edu iburst minpoll 6 maxpoll 10
server ntp.se iburst minpoll 6 maxpoll 10

# Allow stepping the clock at any time when offset > 0.5s
# limit=-1 means unlimited steps - handles Pi no-RTC cold boot + GPS offset at startup
makestep 0.5 -1
maxupdateskew 100.0
minsources 1
