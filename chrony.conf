# /etc/chrony/chrony.conf - GPS+PPS time server for RPI-Clock

driftfile /var/lib/chrony/drift
logdir /var/log/chrony
log measurements tracking

# NTP Pool serving - remove 'allow all' to stop serving NTP to network clients
allow all
cmdallow 127.0.0.1
cmdallow ::1

# GPS NMEA via gpsd SHM segment 0 - noselect, only provides second-of-the-minute context
# Note: lock GPS removed from PPS - GPS second-assignment is unreliable (frequent wrong-second
# events from PA6H module losing lock); NTP consensus now determines which second PPS belongs to.
refclock SHM 0 refid GPS offset 0 delay 0.5 noselect poll 4

# PPS hardware signal from GPS HAT GPIO - primary precision source
# Removed: lock GPS (GPS too flaky for second disambiguation; NTP servers handle this)
# Removed: trust (allows falseticker detection to reject PPS when GPS gives wrong second)
# prefer: choose PPS over NTP servers when available and sane
refclock PPS /dev/pps0 refid PPS poll 4 prefer

# NTP servers for epoch (second-level) reference and PPS cross-validation
# Four sources gives proper falseticker detection: when GPS gives PPS wrong second,
# 4 NTP sources form consensus and chrony rejects the outlier PPS automatically.
server time.cloudflare.com iburst minpoll 4 maxpoll 6
server time.google.com iburst minpoll 4 maxpoll 6
server clock1.unc.edu iburst minpoll 4 maxpoll 6
server ntp.se iburst minpoll 4 maxpoll 6

# Only step clock during first 3 updates (boot from unknown state); slew-only after that.
# Prevents GPS dropout/wrong-second events from causing visible clock steps mid-operation.
makestep 1.0 3
maxupdateskew 100.0
minsources 1
