# /etc/chrony/chrony.conf - GPS+PPS time server for RPI-Clock

driftfile /var/lib/chrony/drift
logdir /var/log/chrony
log measurements tracking

# NTP Pool serving - remove 'allow all' to stop serving NTP to network clients
allow all
cmdallow 127.0.0.1
cmdallow ::1

# GPS NMEA via gpsd SHM segment 2
# noselect: used only as 1-second reference to resolve which second each PPS pulse belongs to;
# chrony will not try to discipline the clock from NMEA directly (too noisy at ~440ms offset)
refclock SHM 2 refid GPS offset -0.440 delay 0.1 noselect poll 4

# PPS hardware signal from GPS HAT GPIO 4 - primary precision source
# lock GPS: requires GPS to be reachable (Reach > 0) before PPS is usable
# prefer: choose PPS over NTP servers when available
# trust: include in source selection even when offset disagrees with NTP cluster
refclock PPS /dev/pps0 refid PPS lock GPS poll 4 prefer trust

# Fallback NTP servers (used when PPS is not available or during initial sync)
server clock1.unc.edu iburst minpoll 6 maxpoll 10
server ntp.se iburst minpoll 6 maxpoll 10

# Allow stepping the clock at any time when offset > 0.5s
# limit=-1 means unlimited steps - handles Pi no-RTC cold boot + 1s GPS offset at startup
makestep 0.5 -1
maxupdateskew 100.0
minsources 1
